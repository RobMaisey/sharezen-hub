<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShareZen</title>
<meta name="description" content="ShareZen Consulting Ltd.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Schibsted+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0e1733;
    --navy-deep: #080d1f;
    --btn: #16203f;
    --btn-hover: #1b2748;
    --brass: #c2a45c;
    --copper: #b27149;
    --white: #eceff6;
    --muted: rgba(236, 239, 246, 0.58);
    --faint: rgba(236, 239, 246, 0.30);
    --line: rgba(236, 239, 246, 0.12);
    --display: "Fraunces", Georgia, serif;
    --body: "Schibsted Grotesk", system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    min-height: 100vh;
    font-family: var(--body);
    color: var(--white);
    background:
      radial-gradient(120% 90% at 50% -5%, rgba(255, 255, 255, 0.035), transparent 55%),
      linear-gradient(175deg, var(--navy) 0%, var(--navy-deep) 100%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(2rem, 6vw, 4rem) 1.25rem;
  }

  .panel {
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  /* ---- masthead ---- */
  .mark {
    display: inline-flex;
    margin-bottom: 1.4rem;
    opacity: 0;
    animation: rise 0.7s ease forwards;
  }
  .mark svg { width: clamp(46px, 10vw, 58px); height: clamp(46px, 10vw, 58px); display: block; }

  h1 {
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(2.7rem, 11vw, 4rem);
    line-height: 1;
    letter-spacing: 0.01em;
    opacity: 0;
    animation: rise 0.75s ease 0.06s forwards;
  }

  .subtitle {
    margin-top: 0.85rem;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--brass);
    opacity: 0;
    animation: rise 0.75s ease 0.12s forwards;
  }

  .rule {
    height: 1px;
    background: var(--line);
    margin: clamp(1.8rem, 5vw, 2.6rem) 0;
    opacity: 0;
    animation: rise 0.75s ease 0.18s forwards;
  }

  /* ---- buttons ---- */
  .btn {
    --accent: var(--brass);
    display: flex;
    align-items: center;
    gap: 1rem;
    text-align: left;
    width: 100%;
    background: var(--btn);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: clamp(1rem, 3.5vw, 1.3rem) clamp(1.1rem, 4vw, 1.4rem);
    text-decoration: none;
    color: inherit;
    opacity: 0;
    animation: rise 0.7s ease forwards;
    transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s ease;
  }
  .btn.asset { --accent: var(--copper); }
  .btn + .btn { margin-top: 0.85rem; }
  .btn:nth-of-type(1) { animation-delay: 0.24s; }
  .btn:nth-of-type(2) { animation-delay: 0.31s; }
  .btn:nth-of-type(3) { animation-delay: 0.38s; }

  .btn:hover {
    background: var(--btn-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.32);
  }

  .ico {
    flex-shrink: 0;
    color: var(--accent);
    display: grid;
    place-items: center;
  }
  .ico svg { width: 24px; height: 24px; display: block; }

  .btn-text { min-width: 0; }
  .label {
    font-family: var(--display);
    font-weight: 500;
    font-size: clamp(1.15rem, 4.5vw, 1.4rem);
    line-height: 1.12;
    letter-spacing: -0.01em;
  }

  .sub-wrap {
    display: grid;
    grid-template-rows: 0fr;
    opacity: 0;
    margin-top: 0;
    transition: grid-template-rows 0.35s ease, opacity 0.35s ease, margin-top 0.35s ease;
  }
  .sub {
    overflow: hidden;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.4;
  }
  .btn:hover .sub-wrap { grid-template-rows: 1fr; opacity: 1; margin-top: 0.3rem; }

  @media (hover: none) {
    .sub-wrap { grid-template-rows: 1fr; opacity: 1; margin-top: 0.3rem; }
  }

  /* ---- footer ---- */
  footer {
    margin-top: clamp(2.2rem, 6vw, 3rem);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.4rem 1.6rem;
    font-size: 0.8rem;
    color: var(--faint);
    opacity: 0;
    animation: rise 0.8s ease 0.5s forwards;
  }
  footer a { color: var(--muted); text-decoration: none; transition: color 0.25s ease; }
  footer a:hover { color: var(--brass); }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    .mark, h1, .subtitle, .rule, .btn, footer { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="panel">
    <span class="mark">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <line x1="35" y1="50" x2="70" y2="28" stroke="#c2a45c" stroke-width="6" stroke-linecap="round"/>
        <line x1="35" y1="50" x2="70" y2="72" stroke="#c2a45c" stroke-width="6" stroke-linecap="round"/>
        <circle cx="70" cy="26" r="13" fill="#c2a45c"/>
        <circle cx="70" cy="74" r="13" fill="#c2a45c"/>
        <circle cx="30" cy="50" r="13" fill="#c2a45c"/>
      </svg>
    </span>

    <h1>ShareZen</h1>
    <p class="subtitle">Consulting Ltd.</p>

    <div class="rule"></div>

    <nav>
      <a class="btn" href="https://www.sharezen.ca" target="_top">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2.5 7 5-14 2.5 7H21"/></svg></span>
        <span class="btn-text">
          <span class="label">WorkFit</span>
          <span class="sub-wrap"><span class="sub">Operational workplace mental health</span></span>
        </span>
      </a>

      <a class="btn" href="https://www.disabilitycasemanagement.ca" target="_top">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4h6a1 1 0 0 1 1 1v1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h1V5a1 1 0 0 1 1-1Z"/><path d="M9 13l2 2 4-4"/></svg></span>
        <span class="btn-text">
          <span class="label">Complex Disability Case Management</span>
          <span class="sub-wrap"><span class="sub">Clinical case management for complex claims</span></span>
        </span>
      </a>

      <a class="btn asset" href="https://sharezenpro.com" target="_top">
        <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="10.5" x2="15.4" y2="6.5"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/></svg></span>
        <span class="btn-text">
          <span class="label">The Future of Sharing</span>
          <span class="sub-wrap"><span class="sub">Shared ownership of boats, aircraft, and homes</span></span>
        </span>
      </a>
    </nav>

    <footer>
      <a href="mailto:rob@sharezen.com">rob@sharezen.com</a>
      <a href="tel:+16049049400">(604) 904-9400</a>
    </footer>
  </div>
</body>
</html>
